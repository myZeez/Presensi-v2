<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Karyawan</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Menggunakan icon dari Phosphor Icons untuk tampilan modern -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <!-- Main Content Area -->
        <main class="app-main">
            <!-- SECTION: HOME (Beranda Presensi) -->
            <section id="section-home" class="view-section active">
                
                <!-- Hero Card (Background Image Area) -->
                <div class="hero-card" style="background-image: url('backround.jpg');">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <p id="hero-date">Selasa, 10 Maret 2025</p>
                        <h1 id="hero-title">Halo, <strong>Karyawan</strong></h1>
                        <p id="hero-subtitle">Posisi Anda</p>
                        
                        <!-- Main Workflow Button -->
                        <button id="main-action-btn" class="btn-main btn-white mt-4" onclick="handleMainAction()">Masuk</button>
                    </div>
                </div>

                <!-- Secondary Actions -->
                <div class="action-grid-2">
                    <button class="btn-dark" onclick="openIzinModal()">Izin</button>
                    <button class="btn-neon" onclick="recordAttendance('Lembur')">Lembur</button>
                </div>
                
                <!-- Timeline Hari Ini -->
                <div class="timeline-section">
                    <h3 class="section-title-sm">Hari Ini</h3>
                    <div class="timeline-container" id="timeline-container">
                        <!-- Rendered by JS -->
                        <p class="empty-state">Belum ada aktivitas hari ini.</p>
                    </div>
                </div>
            </section>

            <!-- SECTION: REPORT (Laporan Bulanan) -->
            <section id="section-report" class="view-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <select id="report-month-filter" onchange="renderReport(this.value)" style="font-size: 1.25rem; font-weight: 700; border: none; background: transparent; outline: none; padding: 0; color: var(--text-main); cursor: pointer;">
                        <!-- Options diisi oleh JavaScript -->
                    </select>
                    <button class="btn-primary" onclick="printPDF()" style="padding: 8px 12px; border-radius: 8px; border: none; background: var(--primary); color: white; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 6px;">
                        <i class="ph ph-printer"></i> Cetak PDF
                    </button>
                </div>
                <div class="report-summary">
                    <div class="summary-item"><span id="count-masuk">0</span><label>Hadir</label></div>
                    <div class="summary-item"><span id="count-izin">0</span><label>Izin</label></div>
                    <div class="summary-item"><span id="count-alpa">0</span><label>Alpa</label></div>
                </div>
                <div class="report-list" id="monthly-report-list">
                    <!-- List dirender via JS -->
                </div>
            </section>

            <!-- SECTION: SETTINGS (Pengaturan) -->
            <section id="section-settings" class="view-section">
                <h2 class="section-title">Pengaturan Profil</h2>
                <div class="card form-card">
                    <div class="form-group">
                        <label for="input-name">Nama Lengkap</label>
                        <input type="text" id="input-name" placeholder="Masukkan nama Anda">
                    </div>
                    <div class="form-group">
                        <label for="input-position">Posisi / Bagian</label>
                        <input type="text" id="input-position" placeholder="Contoh: Seles Penjualan">
                    </div>
                    <div class="form-group">
                        <label for="input-status">Status Karyawan</label>
                        <select id="input-status">
                            <option value="Part-Time">Part-Time</option>
                            <option value="Training">Training</option>
                            <option value="Karyawan">Karyawan</option>
                        </select>
                    </div>
                    <button class="btn btn-save" onclick="saveProfile()">Simpan Profil</button>
                </div>

                <div class="card danger-card mt-4">
                    <h3>Hapus Data</h3>
                    <p>Tindakan ini akan menghapus seluruh data presensi dan profil Anda di perangkat ini.</p>
                    <button class="btn btn-danger-outline" onclick="clearAllData()">Bersihkan Semua Data</button>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('home', this)">
                <i class="ph ph-house"></i>
                <span>Beranda</span>
            </button>
            <button class="nav-item" onclick="switchTab('report', this)">
                <i class="ph ph-calendar-check"></i>
                <span>Laporan</span>
            </button>
            <button class="nav-item" onclick="switchTab('settings', this)">
                <i class="ph ph-gear"></i>
                <span>Pengaturan</span>
            </button>
        </nav>
    </div>

    <!-- Modal Izin -->
    <div id="modal-izin" class="modal-overlay">
        <div class="modal-content">
            <h3>Pilih Jenis Izin</h3>
            <div class="form-group mt-3">
                <select id="select-izin">
                    <option value="Izin Sakit">Sakit</option>
                    <option value="Izin Keperluan Lain">Keperluan Lainnya</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeIzinModal()">Batal</button>
                <button class="btn btn-primary" onclick="submitIzin()">Kirim Izin</button>
            </div>
        </div>
    </div>

    <!-- Custom Alert Modal -->
    <div id="custom-alert" class="modal-overlay" style="z-index: 10000;">
        <div class="modal-content" style="max-width: 320px; text-align: center; padding: 24px;">
            <div id="custom-alert-message" style="margin-bottom: 24px; font-size: 1rem; color: var(--text-main); line-height: 1.5;"></div>
            <button class="btn-main btn-dark" onclick="closeCustomAlert()" style="padding: 12px; margin-top: 0; width: 100%;">OK</button>
        </div>
    </div>
    <!-- Custom Confirm Modal -->
    <div id="custom-confirm" class="modal-overlay" style="z-index: 10000;">
        <div class="modal-content" style="max-width: 320px; text-align: center; padding: 24px;">
            <div id="custom-confirm-message" style="margin-bottom: 24px; font-size: 1rem; color: var(--text-main); line-height: 1.5;"></div>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button class="btn btn-outline" onclick="closeCustomConfirm()" style="flex: 1;">Batal</button>
                <button class="btn-main btn-dark" id="btn-custom-confirm-yes" style="flex: 1; margin: 0; padding: 12px; border-radius: 12px;">Ya</button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
